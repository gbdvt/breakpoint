<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breakpoint</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 300px;
        margin: 0;
        padding: 14px 12px 12px;
        font:
          12px/1.35 system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        color: rgba(255, 255, 255, 0.88);
        background: linear-gradient(160deg, #0a0d14 0%, #060810 100%);
      }
      #root {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }
      .pill {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.06),
          0 8px 24px rgba(0, 0, 0, 0.35);
      }
      .pill--alert {
        border-color: rgba(255, 130, 150, 0.35);
        background: rgba(200, 50, 70, 0.22);
        color: rgba(60, 12, 18, 0.92);
      }
      .pill--alert .pill-main {
        color: rgba(45, 8, 12, 0.95);
      }
      .pill--idle {
        justify-content: center;
        color: rgba(255, 255, 255, 0.55);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .pill-icon {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pill-icon svg {
        display: block;
      }
      .pill-main {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        font-size: 11.5px;
        letter-spacing: 0.01em;
        line-height: 1.35;
        word-break: break-word;
      }
      .fav {
        width: 18px;
        height: 18px;
        border-radius: 5px;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.08);
        object-fit: contain;
      }
      a.subtle {
        display: block;
        text-align: center;
        font-size: 11px;
        font-weight: 500;
        color: rgba(148, 196, 255, 0.55);
        text-decoration: none;
      }
      a.subtle:hover {
        color: rgba(186, 220, 255, 0.85);
      }
      .err {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(180, 40, 50, 0.15);
        border: 1px solid rgba(255, 120, 130, 0.2);
        color: #fecaca;
        font-size: 11px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
