<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breakpoint</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 300px;
        margin: 0;
        padding: 12px 14px 14px;
        font:
          13px/1.45 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: #0f172a;
        background: #fafafa;
      }
      h1 {
        margin: 0 0 2px;
        font-size: 15px;
        font-weight: 650;
      }
      .sub {
        margin: 0 0 12px;
        font-size: 11px;
        color: #64748b;
      }
      .ver {
        display: block;
        margin-top: 4px;
        font-size: 10px;
        color: #94a3b8;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .card {
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        padding: 10px 12px;
        margin-bottom: 10px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 8px;
        margin-bottom: 6px;
      }
      .row:last-child {
        margin-bottom: 0;
      }
      .label {
        font-size: 11px;
        color: #64748b;
      }
      .value {
        font-weight: 600;
        font-size: 13px;
        text-align: right;
        word-break: break-word;
      }
      .drift-on {
        color: #b45309;
      }
      .drift-off {
        color: #15803d;
      }
      .goal {
        font-size: 12px;
        color: #334155;
        margin-top: 6px;
        line-height: 1.4;
      }
      a.btn {
        display: block;
        text-align: center;
        padding: 8px 10px;
        border-radius: 8px;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
      }
      a.btn:hover {
        filter: brightness(1.08);
      }
      .err {
        color: #b91c1c;
        font-size: 12px;
      }
      .muted {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Breakpoint</h1>
    <p class="sub">
      Session & drift snapshot
      <span id="ext-version" class="ver"></span>
    </p>
    <div id="root"></div>
    <script src="popup.js"></script>
  </body>
</html>
